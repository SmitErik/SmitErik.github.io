<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Gwent Classic</title>
</head>
<body style="text-align: center; padding: 0; border: 0; margin: 0; overflow: hidden; background: black">
    <canvas id="unity-canvas" width=1920 height=1080 style="width: 100%; height: 100%"></canvas>
    <div id="mobile-error" style="color: white; display: flex; flex-direction: column; justify-content: center; text-align: center; height: 100vh">This game does not work on mobile devices. If you want to play it, plase do it on PC.<br />Thanks for your understanding!</div>
    <script src="Build/gwent.loader.js"></script>
    <script>
        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent))
            document.getElementById('unity-canvas').remove();
        else {
            document.getElementById('mobile-error').remove();

            createUnityInstance(document.querySelector("#unity-canvas"), {
                dataUrl: "Build/gwent.data",
                frameworkUrl: "Build/gwent.framework.js",
                codeUrl: "Build/gwent.wasm",
                streamingAssetsUrl: "StreamingAssets",
                companyName: "_mitE",
                productName: "Gwent Classic",
                productVersion: "1.0",
                devicePixelRatio: 1,
            });
        }
    </script>
</body>
</html>
