<!doctype html>
<html lang="en">
<head>
	<link rel="icon" href="Icon.png" type="image/gif" sizes="32x32">
	<title>Logic</title>
	<link rel="stylesheet" href="../header.css">
	<link rel="stylesheet" href="style.css">
</head>

<body>
	<div class="header">
		<a href="..">$mitE Games</a>
		<a href="../about"><div class="logo"></div></a>
	</div>

	<table>
		<tbody>
			<tr>
				<td colspan="3">
					<img src="Eddy.png" alt="Eddy" id="eddy">
				</td>
			</tr>
			<tr>
				<td class="left">
					<img src="Lily.png" alt="Lily" id="lily">
				</td>
				<td rowspan="2" class="textarea center">
					<img src="Logic.png" alt="Logic" id="title">
					Trailer: <a href="https://youtu.be/ihEZWWHHKN0">https://youtu.be/ihEZWWHHKN0</a>
					<hr>
					<div class="content">
						<p class="text">Latest version: <b class="big" id="version"></b></p>
						<a href="https://drive.google.com/drive/folders/1i_uX624-9yZ3vNiFrFF98xjZnpT9GeW5?usp=sharing" class="button">
							<span>Download</span>
							<div id="light"></div>
						</a>
						<p>I couldn't give you the professional way of download Logic, but here's a Google Drive link where you can safely get the game.</p>
						<div id="patches">
						</div>
					</div>
				</td>
				<td class="right">
					<img src="Bob.png" alt="Bob" id="bob">
				</td>
			</tr>
			<tr>
				<td class="left bottom">
					<img src="Jack.png" alt="Jack" id="jack">
				</td>
				<td class="right bottom">
					<img src="Roby.png" alt="Roby" id="roby">
				</td>
			</tr>
		</tbody>
	</table>
</body>

<script>
	fetch('patch_notes.txt').then(x => x.text()).then(x => {
		let lines = x.split('\n');
		document.getElementById('version').innerHTML = lines[0];

		let patches = '<hr>';
		let list = false;
		let listNumber = 0;

		for(let i = 0; i < lines.length; i++) {

			console.log(lines[i]);

			if (lines[i].length <= 1) {
				console.log(0);

				if (!list)
					patches += '</span>';
				patches += '<hr>';
				list = 0;
				continue;
			}

			if (lines[i].charAt(0) >= 0 && lines[i].charAt(0) <= 9) {
				console.log(1);

				patches += '\n<span class="patch"><b class="big">' + lines[i] + '</b> ~ ';
			}

			else if (lines[i].charAt(0) === ':') {
				console.log(2);

				if (!list)
					patches += '<u class="dropdown closed" id="' + listNumber + '" onclick="dropdown(' + listNumber + ')"></u></span><ul id="list' + (listNumber++) + '">';
				else
					patches += '</ul>';

				list = !list;
			}

			else {
				console.log(3);

				if (list)
					patches += '<li>' + lines[i] + '</li>';
				else
					patches += lines[i];
			}
		}

		document.getElementById('patches').innerHTML = patches;
	})

	function dropdown(listID) {
		if (document.getElementById(listID).classList.contains('closed')) {
			document.getElementById(listID).classList.remove('closed');
			document.getElementById(listID).classList.add('opened');

			document.getElementById('list' + listID).style.display = 'block';
		}
		else {
			document.getElementById(listID).classList.remove('opened');
			document.getElementById(listID).classList.add('closed');

			document.getElementById('list' + listID).style.display = 'none';
		}
	}
</script>

</html>
